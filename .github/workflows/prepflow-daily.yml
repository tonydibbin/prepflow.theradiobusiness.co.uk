name: Prepflow daily edition

on:
  schedule:
    # 14:59 UK time, every day.
    # Cron in GitHub Actions is UTC. The UK is UTC+1 (BST, late March → late October)
    # and UTC+0 (GMT, late October → late March). We run TWO crons and the script
    # itself works out tomorrow's UK-local date — so duplicate runs in the DST overlap
    # week are harmless (they just regenerate the same file).
    - cron: '59 13 * * *'   # 13:59 UTC = 14:59 BST
    - cron: '59 14 * * *'   # 14:59 UTC = 14:59 GMT
  workflow_dispatch:
    inputs:
      target_date:
        description: 'Override target date (YYYY-MM-DD). Leave blank for tomorrow.'
        required: false
        default: ''

permissions:
  contents: write     # to commit the generated edition files

concurrency:
  group: prepflow-daily
  cancel-in-progress: false

jobs:
  generate:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'
          cache-dependency-path: 'scripts/requirements.txt'

      - name: Install WeasyPrint system deps
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            libpango-1.0-0 libpangoft2-1.0-0 libharfbuzz0b \
            libcairo2 libgdk-pixbuf-2.0-0 libffi-dev

      - name: Install Python deps
        run: pip install -r scripts/requirements.txt

      - name: Generate edition
        env:
          # Free-tier Gemini key from https://aistudio.google.com/apikey
          # If unset, the script falls back to raw BBC text (still produces a valid edition).
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          PREPFLOW_TARGET_DATE: ${{ github.event.inputs.target_date }}
          # Send the generator's output straight into the dist/ folder ready for SFTP.
          PREPFLOW_OUT_DIR: ./dist
        run: |
          mkdir -p dist
          python scripts/generate_edition.py

      - name: List generated files
        run: ls -la dist/

      - name: Deploy to IONOS via SFTP
        # Pushes the freshly-generated edition into /prepflow/_generated/ on IONOS,
        # where view.php and download.php (already deployed) serve it behind the
        # subscription paywall.
        uses: wlixcc/SFTP-Deploy-Action@v1.2.4
        with:
          server: 'access814933954.webspace-data.io'
          username: 'u99864759'
          password: ${{ secrets.IONOS_SFTP_PASSWORD }}
          port: 22
          local_path: './dist/*'
          remote_path: '/prepflow/_generated'
          sftp_only: true
          delete_remote_files: false

      - name: Also commit to repo (history / fallback)
        run: |
          git config user.name "prepflow-bot"
          git config user.email "actions@github.com"
          mkdir -p editions
          cp -f dist/*.html dist/*.pdf editions/ 2>/dev/null || true
          git add editions/
          if git diff --cached --quiet; then
            echo "No changes to commit."
          else
            git commit -m "edition: $(date -u +%F) auto-build"
            git push
          fi
